<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeX | alos.gg</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="entry-overlay" onclick="startSite()">
        <div class="enter-text">[ click to enter ]</div>
    </div>

    <video loop muted playsinline id="bg-video">
        <source src="https://r2.e-z.host/208244a3-4be1-4386-8968-0796333423a6/78r2vov5.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3" type="audio/mpeg">
    </audio>

    <main class="wrapper">
        <div class="container">
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img src="./png/pfp.png" alt="pfp" class="profile-img">
                </div>
                <h1 class="name">ZeX</h1>
                <p class="bio">coding since 2016 • owner@alos</p>
            </div>

            <div class="social-links">
                <a href="https://github.com/ddosnotification" class="link-card" target="_blank">
                    <img src="https://api.iconify.design/line-md:github-loop.svg?color=%23ffffff" class="link-icon">
                    <span>GitHub</span>
                </a>
                <a href="https://t.me/ddosnotification" class="link-card" target="_blank">
                    <img src="https://api.iconify.design/line-md:telegram.svg?color=%23ffffff" class="link-icon">
                    <span>Telegram</span>
                </a>
                <a href="https://alos.gg" class="link-card" target="_blank">
                    <img src="https://api.iconify.design/line-md:external-link.svg?color=%23ffffff" class="link-icon">
                    <span>alos.gg</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        function startSite() {
            const overlay = document.getElementById('entry-overlay');
            const video = document.getElementById('bg-video');
            const music = document.getElementById('bg-music');

            // Fade out overlay
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1000);

            // Start media
            video.muted = false; // Unmute video if it has sound
            video.play();
            music.play();
        }
    </script>
</body>
</html>
