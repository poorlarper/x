<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeX | alos.gg</title>

    <meta name="title" content="ZeX (ddosnotification)">

    <link rel="stylesheet" href="./css/style.css">

    <style>
        /* --- GUNS.LOL AESTHETIC OVERRIDES --- */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden; /* Prevents scrolling before entry */
            font-family: 'Inter', sans-serif;
        }

        /* Entry Overlay */
        #entry-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }

        .enter-text {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-size: 0.8rem;
            animation: breathe 2s infinite alternate;
        }

        @keyframes breathe {
            from { opacity: 0.4; text-shadow: 0 0 5px #fff; }
            to { opacity: 1; text-shadow: 0 0 20px #fff; }
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: brightness(35%) blur(2px);
            object-fit: cover;
        }

        /* The Glass Card */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .profile-img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }

        .name {
            font-size: 2.2rem;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .bio {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* Links Styling */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>

    <script>
        function enterSite() {
            const overlay = document.getElementById('entry-overlay');
            overlay.style.opacity = '0';
            
            // Allow clicking through once invisible
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 1000);
        }
